# Single source of truth for benchmark definitions.
# Run `cargo xtask gen-benchmarks` to regenerate harness files.

[[preamble]]
code = "use yamalgam_core::config::{Config, ConfigLoader, ConfigSources};"

[[benchmark]]
name = "load_defaults"
module = "config"
return = "(Config, ConfigSources)"
body = """
black_box(
    ConfigLoader::new()
        .with_user_config(false)
        .without_boundary_marker()
        .load()
        .unwrap(),
)
"""

[[benchmark]]
name = "construct_loader"
module = "config"
return = "ConfigLoader"
body = "black_box(ConfigLoader::new())"
