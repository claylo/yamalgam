name: Fuzz

on:
  pull_request:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC daily
  workflow_dispatch:
    inputs:
      duration:
        description: 'Seconds per target'
        default: '60'

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_scanner_bytes
          - fuzz_parser_bytes
          - fuzz_scanner_structured
          - fuzz_parser_structured
          - fuzz_limits
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Rust nightly toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Seed corpus
        run: bash scripts/seed-fuzz-corpus

      - name: Run fuzzer
        run: |
          DURATION=${{ github.event.inputs.duration || (github.event_name == 'schedule' && '3600' || '60') }}
          echo "Running ${{ matrix.target }} for ${DURATION}s"
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=$DURATION

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/
          retention-days: 90
